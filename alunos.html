<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Alunos - Suia Studio</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f5f5f5;
    }

    h1 {
      margin-top: 30px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background-color: black;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    /* Modal */
    .modal {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 800px;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }

    /* Botão fechar */
    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 20px;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <h1>Cadastro de Alunos</h1>

  <button onclick="abrirForm()">Novo Aluno</button>

  <!-- Overlay -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <span class="close" onclick="fecharForm()">✖</span>

      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScvsosVj5uN_l2rTX-cjRSCI_3WekK36uMNpEm1iBslcFaXYg/viewform?embedded=true" width="640" height="826" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>

    </div>
  </div>

  <script>
    function abrirForm() {
      document.getElementById("overlay").style.display = "flex";
    }

    function fecharForm() {
      document.getElementById("overlay").style.display = "none";
    }
  </script>

</body>
</html>
