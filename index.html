<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Suia ERP</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f5f5f5;
    }

    h1 {
      margin-top: 40px;
    }

    .container {
      margin-top: 40px;
    }

    button {
      display: block;
      width: 250px;
      margin: 15px auto;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background-color: black;
      color: white;
      cursor: pointer;
    }

    /* Overlay (modal fundo) */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    /* Caixa modal */
    .modal {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 900px;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }

    /* Botão fechar */
    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 20px;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <h1>Suia ERP</h1>

  <div class="container">

    <button onclick="abrirForm()">Novo Aluno</button>

    <button onclick="abrirLista()">Lista de Alunos</button>

    <button onclick="alert('Em breve')">Marcar Presença</button>

  </div>

  <!-- MODAL NOVO ALUNO -->
  <div class="overlay" id="overlayForm">
    <div class="modal">
      <span class="close" onclick="fecharForm()">✖</span>

      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScvsosVj5uN_l2rTX-cjRSCI_3WekK36uMNpEm1iBslcFaXYg/viewform?embedded=true" width="640" height="826" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>

    </div>
  </div>

  <!-- MODAL LISTA DE ALUNOS -->
  <div class="overlay" id="overlayLista">
    <div class="modal">
      <span class="close" onclick="fecharLista()">✖</span>

      <h2>Lista de Alunos</h2>

      <table>
        <thead>
          <tr id="header"></tr>
        </thead>
        <tbody id="body"></tbody>
      </table>

    </div>
  </div>

<script src="script.js"></script>

</body>
</html>
