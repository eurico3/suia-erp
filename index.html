<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Suia Studio ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Suia Studio ERP</h1>

  <div class="container">

    <button onclick="abrirForm()">Novo Aluno</button>

    <button onclick="abrirLista()">Lista de Alunos</button>

    <button onclick="abrirPresenca()">Marcar Presença</button>

  </div>

  <!-- MODAL NOVO ALUNO -->
  <div class="overlay" id="overlayForm">
    <div class="modal">
      <span class="close" onclick="fecharForm()">×</span>
      <h2>Novo Aluno</h2>

      <input type="text" id="nome" placeholder="Nome completo"><br><br>
      <input type="text" id="whatsapp" placeholder="WhatsApp"><br><br>
      <input type="email" id="email" placeholder="Email"><br><br>
      <textarea id="obs" placeholder="Observações"></textarea><br><br>

      <button onclick="guardarAluno()">Guardar</button>
    </div>
  </div>

  <!-- MODAL LISTA DE ALUNOS -->
  <div class="overlay" id="overlayLista">
    <div class="modal">
      <span class="close" onclick="fecharLista()">✖</span>

      <h2>Lista de Alunos</h2>

      <table>
        <thead>
          <tr id="header"></tr>
        </thead>
        <tbody id="body"></tbody>
      </table>

    </div>
  </div>


  <!-- MODAL PRESENÇA DE ALUNOS -->
  <div class="overlay" id="overlayPresenca">
  <div class="modal">
    <span class="close" onclick="fecharPresenca()">×</span>
    <h2>Marcar Presença</h2>

    <div id="listaAlunosPresenca"></div>

    <button onclick="guardarPresenca()">Guardar Presença</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
