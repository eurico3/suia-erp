<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Suia Studio ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

  <img src="Logo SUIA.png" alt="Suia Studio" class="logo">

  <div class="container">

    <button onclick="abrirForm()">Novo Aluno</button>

    <button onclick="abrirLista()">Lista de Alunos</button>

    <button onclick="abrirCartela()">Nova Cartela</button>

    <button onclick="abrirPresenca()">Marcar Presença</button>

    <button onclick="abrirVouchers()">Saldo de Vouchers</button>

    <button onclick="abrirCompras()">Compras de Cerâmica</button>

    <button onclick="abrirRelatorio()">Relatório Presenças</button>

    <button onclick="abrirRelatorioFinanceiro()">Relatório Financeiro</button>

  </div>

  <!-- MODAL NOVO ALUNO -->
  <div class="overlay" id="overlayForm">
    <div class="modal">
      <span class="close" onclick="fecharForm()">×</span>
      <h2>Novo Aluno</h2>

      <input type="text" id="nome" placeholder="Nome completo"><br><br>
      <input type="text" id="whatsapp" placeholder="WhatsApp"><br><br>
      <input type="email" id="email" placeholder="Email"><br><br>
      <select id="turma">
        <option value="">Selecionar Turma</option>
        <option value="Terça 14:00">Terça 14:00</option>
        <option value="Terça 19:00">Terça 19:00</option>
        <option value="Quarta 14:00">Quarta 14:00</option>
        <option value="Quinta 9:00">Quinta 9:00</option>
      </select><br><br>
      <textarea id="obs" placeholder="Observações"></textarea><br><br>

      <button onclick="guardarAluno()">Guardar</button>
    </div>
  </div>

  <!-- MODAL LISTA DE ALUNOS -->
  <div class="overlay" id="overlayLista">
    <div class="modal">
      <span class="close" onclick="fecharLista()">✖</span>

      <h2>Lista de Alunos</h2>

      <table>
        <thead>
          <tr id="header"></tr>
        </thead>
        <tbody id="body"></tbody>
      </table>

    </div>
  </div>


  <!-- MODAL PRESENÇA DE ALUNOS -->
  <div class="overlay" id="overlayPresenca">
  <div class="modal">
    <span class="close" onclick="fecharPresenca()">×</span>
    <h2>Marcar Presença</h2>

    <div id="listaAlunosPresenca"></div>

    <button onclick="guardarPresenca()">Guardar Presença</button>
  </div>
  </div>

  <!-- MODAL RELATÓRIO DE ALUNOS -->
  <div class="overlay" id="overlayRelatorio">
  <div class="modal">
    <span class="close" onclick="fecharRelatorio()">×</span>
    <h2>Relatório de Aulas</h2>

    <div id="relatorio"></div>
  </div>
  </div>
  
  <!-- MODAL CARTELA -->
  <div class="overlay" id="overlayCartela">
  <div class="modal">
    <span class="close" onclick="fecharCartela()">×</span>
    <h2>Nova Cartela</h2>

    <input type="date" id="dataCartela"><br><br>

    <select id="alunoCartela"></select><br><br>

    <button onclick="guardarCartela()">Guardar</button>
  </div>
  </div>
  
  <!-- MODAL VOUCHERS -->
  <div class="overlay" id="overlayVouchers">
    <div class="modal">
      <span class="close" onclick="fecharVouchers()">×</span>
      <h2>Saldo de Vouchers</h2>

      <div id="relatorioVouchers"></div>
    </div>
  </div>


  <!-- MODAL COMPRA CERÂMICA -->
  <div class="overlay" id="overlayCompras">
  <div class="modal">
    <span class="close" onclick="fecharCompras()">×</span>
    <h2>Registrar Cerâmica</h2>
    
    <input type="date" id="dataCompra"><br><br>
    
    <select id="alunoCompra"></select>

    <select id="tipoCeramica">
      <option value="" disabled selected>Selecionar tipo de cerâmica</option>
      <option value="Barro Vermelho">Barro Vermelho</option>
      <option value="Barro Branco">Barro Branco</option>
      <option value="Grés">Grés</option>
      <option value="Porcelana">Porcelana</option>
    </select><br><br>

    <input type="number" id="peso" placeholder="Peso (kg)"><br><br>

        <button onclick="guardarCompra()">Guardar</button>
  </div>
  </div>

  <!-- MODAL RELATÓRIO FINANCEIRO -->
  <div class="overlay" id="overlayFinanceiro">
  <div class="modal">
    <span class="close" onclick="fecharRelatorioFinanceiro()">×</span>
    <h2>Relatório Financeiro</h2>

    <div id="relatorioFinanceiro"></div>
  </div>
  </div>

</div>

<script src="script.js?v=2"></script>

</body>
</html>
